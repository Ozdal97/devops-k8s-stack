name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.14.4
      - name: lint
        run: helm lint helm/api
      - name: template (default)
        run: helm template api helm/api > /tmp/default.yaml
      - name: template (staging)
        run: helm template api helm/api -f helm/api/values-staging.yaml > /tmp/staging.yaml

  yaml:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: parse all yaml files
        run: |
          python3 - <<'PY'
          import os, sys, yaml
          bad = []
          skip_dirs = ('/.git', '/helm/api/templates')
          for root, _, files in os.walk('.'):
              if any(s in root for s in skip_dirs):
                  continue
              for f in files:
                  if f.endswith(('.yml', '.yaml')):
                      p = os.path.join(root, f)
                      try:
                          with open(p, 'r', encoding='utf-8') as fh:
                              list(yaml.safe_load_all(fh))
                      except Exception as e:
                          bad.append((p, str(e)))
          if bad:
              for p, e in bad:
                  print(f"FAIL {p}: {e}")
              sys.exit(1)
          print("All YAML parsed OK")
          PY

  shell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: bash -n on scripts
        run: |
          for f in $(find scripts -name "*.sh"); do
            bash -n "$f" && echo "OK $f"
          done

  terraform-structure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ensure expected modules exist
        run: |
          set -e
          test -f terraform/modules/eks/main.tf
          test -f terraform/modules/vpc/main.tf
          test -f terraform/envs/staging/main.tf
          grep -q 'aws_eks_cluster' terraform/modules/eks/main.tf
          grep -q 'aws_vpc'         terraform/modules/vpc/main.tf
          echo "terraform layout OK"
